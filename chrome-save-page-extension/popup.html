<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>网页保存助手</title>
  <style>
    /* 弹窗整体样式 */
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f7f8fa;
      color: #333;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 12px 0;
      text-align: center;
      color: #1a73e8;
    }

    .desc {
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    /* 按钮样式 */
    button {
      width: 100%;
      padding: 10px 0;
      font-size: 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 10px;
    }

    #saveBtn {
      background: #1a73e8;
      color: #fff;
    }

    #saveBtn:hover:not(:disabled) {
      background: #1557b0;
    }

    #saveBtn:disabled {
      background: #a0c4ff;
      cursor: not-allowed;
    }

    /* 进度区域 */
    #progressArea {
      display: none;
      margin-top: 12px;
      padding: 12px;
      background: #fff;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
    }

    #progressArea.active {
      display: block;
    }

    .progress-label {
      font-size: 13px;
      margin-bottom: 6px;
      color: #444;
    }

    /* 进度条 */
    .progress-bar-wrap {
      width: 100%;
      height: 10px;
      background: #e0e0e0;
      border-radius: 5px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #34a853;
      border-radius: 5px;
      transition: width 0.3s ease;
    }

    #statusText {
      font-size: 12px;
      color: #888;
      margin-top: 6px;
      min-height: 18px;
    }

    /* 结果提示 */
    #resultArea {
      display: none;
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
    }

    #resultArea.success {
      display: block;
      background: #e6f4ea;
      color: #137333;
      border: 1px solid #b7e1c5;
    }

    #resultArea.error {
      display: block;
      background: #fce8e6;
      color: #c5221f;
      border: 1px solid #f5b7b1;
    }
  </style>
</head>
<body>
  <h1>网页保存助手</h1>
  <div class="desc">
    点击下方按钮，将当前网页保存为完整的 HTML 文件，并自动下载所有图片、视频等媒体资源到本地 media 文件夹，确保离线后也能完整查看。
  </div>

  <!-- 保存按钮 -->
  <button id="saveBtn">保存当前网页</button>

  <!-- 进度展示区域 -->
  <div id="progressArea">
    <div class="progress-label">
      资源下载进度：<span id="progressCount">0 / 0</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div id="statusText">准备中...</div>
  </div>

  <!-- 结果提示区域 -->
  <div id="resultArea"></div>

  <script src="popup.js"></script>
</body>
</html>
